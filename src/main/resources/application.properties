# Vaadin Application Properties

# Application name
spring.application.name=vaadin-app

# Server configuration
server.port=8080
server.servlet.context-path=/

# Logging
logging.level.root=INFO
logging.level.com.example=DEBUG
logging.level.com.vaadin=DEBUG

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.format_sql=true

# H2 Database Configuration
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Uncomment the PostgreSQL settings below for production or Docker deployment
# spring.datasource.url=jdbc:postgresql://localhost:5432/vaadin_db
# spring.datasource.username=postgres
# spring.datasource.password=your_password
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Vaadin Configuration
vaadin.allowed-packages=com.example
vaadin.pnpm.enable=true
vaadin.productionMode=false

# Development Tools
spring.devtools.restart.enabled=true
